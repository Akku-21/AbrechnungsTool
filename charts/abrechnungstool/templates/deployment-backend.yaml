apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "abrechnungstool.fullname" . }}-backend
  labels:
    {{- include "abrechnungstool.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "abrechnungstool.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "abrechnungstool.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: migrate
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command: ["alembic", "upgrade", "head"]
          {{- if .Values.backend.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.envFromSecret }}
          {{- end }}
          env:
            {{- if .Values.backend.env.DATABASE_URL }}
            - name: DATABASE_URL
              value: {{ .Values.backend.env.DATABASE_URL | quote }}
            {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          {{- if .Values.backend.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.envFromSecret }}
          {{- end }}
          env:
            {{- if .Values.backend.env.DATABASE_URL }}
            - name: DATABASE_URL
              value: {{ .Values.backend.env.DATABASE_URL | quote }}
            {{- end }}
            - name: UPLOAD_DIR
              value: {{ .Values.backend.env.UPLOAD_DIR | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.backend.env.CORS_ORIGINS | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.healthPath | default "/health" }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.healthPath | default "/health" }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.backend.persistence.enabled }}
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          {{- end }}
      {{- if .Values.backend.persistence.enabled }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "abrechnungstool.fullname" . }}-uploads
      {{- end }}
