name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      chart_version: ${{ steps.version.outputs.chart_version }}
      image_tag: ${{ steps.version.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate versions
        id: version
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "owner=${OWNER,,}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "chart_version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "chart_version=0.0.0-dev.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.owner }}/abrechnungstool-frontend:${{ steps.version.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.owner }}/abrechnungstool-frontend:latest
          build-args: APP_VERSION=${{ steps.version.outputs.image_tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.owner }}/abrechnungstool-backend:${{ steps.version.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.owner }}/abrechnungstool-backend:latest
          build-args: APP_VERSION=${{ steps.version.outputs.image_tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  helm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Login to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update Chart.yaml
        run: |
          sed -i "s/^version:.*/version: ${{ needs.build.outputs.chart_version }}/" charts/abrechnungstool/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ needs.build.outputs.image_tag }}\"/" charts/abrechnungstool/Chart.yaml

      - name: Package and push
        run: |
          helm package charts/abrechnungstool
          OWNER="${{ github.repository_owner }}"
          helm push abrechnungstool-${{ needs.build.outputs.chart_version }}.tgz oci://ghcr.io/${OWNER,,}/charts
